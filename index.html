<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Milito Tech Home</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">

  <h2 class="logo">Milito Tech Home</h2>

  <!-- Hamburger Icon -->
  <div class="menu-toggle" id="menu-toggle">
    ☰
  </div>

  <ul class="nav-links" id="nav-links">
    <li><a href="#">Home</a></li>
    <li><a href="#products">Products</a></li>
    <li><a href="#">Contact</a></li>
  </ul>

</nav>

<!-- HERO -->
<section class="hero">
  <h1>Phones & Gadgets</h1>
  <p>Quality devices at the best prices</p>
  <p>Fast delivery • Genuine devices • Warranty available</p>
</section>

<!-- PRODUCTS -->
<section id="products" class="products-section">

  <h2>Available Products</h2>

  <div class="products">

    <div class="card">
      <img src="images/iphone.jpg" alt="">
      <h3>iPhone 11</h3>
      <p class="price">₦200,000</p>
      <a href="https://wa.me/2348162017129">
        <button>Order on WhatsApp</button>
      </a>
    </div>

    <div class="card">
      <img src="images/samsung.jpg" alt="">
      <h3>Samsung S21 ultra</h3>
      <p class="price">₦200,000</p>
      <a href="https://wa.me/2348162017129">
        <button>Order on WhatsApp</button>
      </a>
    </div>

    <div class="card">
      <img src="images/spark.jpg" alt="">
      <h3>Spark 10 pro</h3>
      <p class="price">₦55,000</p>
      <a href="https://wa.me/2348162017129">
        <button>Order on WhatsApp</button>
      </a>
    </div>

  </div>

</section>

<script>
  const toggle = document.getElementById("menu-toggle");
  const navLinks = document.getElementById("nav-links");

  toggle.addEventListener("click", () => {
    navLinks.classList.toggle("active");
  });
</script>

</body>

</html>
